version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hr_goals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_goals"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hr_goals
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CHROMA_PERSIST_DIR: /app/chroma_data
      BGE_MODEL_NAME: BAAI/bge-m3
      LLM_MODEL: claude-sonnet-4-20250514
      LLM_TEMPERATURE_EVAL: "0"
      LLM_TEMPERATURE_GEN: "0.3"
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_data
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
