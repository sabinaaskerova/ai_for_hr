version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hr_goals
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d hr_goals" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        EMBEDDING_MODEL: ${EMBEDDING_MODEL:-azure}
    ports:
      - "8010:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/hr_goals
      CHROMA_PERSIST_DIR: /app/chroma_data
      HACKATHON_DATA_DIR: /app/hackathon_db
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - chroma_data:/app/chroma_data
      - ./backend/data:/app/data
      - ./hackathon_db:/app/hackathon_db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5174:5174"
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  chroma_data:
